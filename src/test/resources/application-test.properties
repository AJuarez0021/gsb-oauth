# Test OAuth2 Configuration
oauth.client.url=http://localhost:8888/oauth/token
oauth.client.attempts=1

# WebClient Configuration
webclient.max-connections=10
webclient.connection-timeout=5000
webclient.read-timeout=5000
webclient.write-timeout=5000

# Disable Swagger in tests
springdoc.swagger-ui.enabled=false

# Actuator
management.endpoints.web.exposure.include=health
